name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            .next/standalone/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/home/nahedrachad-conference/htdocs/conference.nahedrachad.com/
          
          rsync -avz \
            .next/static/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/home/nahedrachad-conference/htdocs/conference.nahedrachad.com/.next/static/
          
          rsync -avz \
            public/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/home/nahedrachad-conference/htdocs/conference.nahedrachad.com/public/

      - name: Restart app with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Load the Node environments so PM2 is recognized
            export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | tail -1)/bin:$PATH"
            source ~/.bashrc || true
            source ~/.profile || true

            # 2. Go to the project directory
            cd /home/nahedrachad-conference/htdocs/conference.nahedrachad.com

            # 3. Check if PM2 is installed, install if not
            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            # 4. Restart the standalone server or start it for the first time
            pm2 restart conference-app || PORT=3004 pm2 start server.js --name "conference-app"
            pm2 save || true