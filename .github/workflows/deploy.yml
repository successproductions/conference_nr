name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            .next/standalone/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/conference/
          rsync -avz \
            .next/static/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/conference/.next/static/
          rsync -avz \
            public/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/conference/public/

      - name: Restart app with PM2
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "cd /var/www/conference && pm2 restart conference-app || pm2 start npm --name 'conference-app' -- start"
